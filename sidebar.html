<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tab Groups Sidebar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="root">
    <div id="workspaceBar"></div>

    <div class="sidebar-sep"></div>

    <div class="search-toolbar">
      <input id="search" placeholder="Search tabs..." />
      <div class="sort-wrap">
        <button id="sortBtn" title="Sort"></button>
        <div id="sortMenu" class="sort-menu hidden">
          <button id="sortDefaultBtn">Chrome Order</button>
          <button id="sortAlphaBtn">A to Z</button>
        </div>
      </div>
      <button id="openCloseBtn" title="Expand all"></button>
      <button id="refreshBtn" title="Refresh"></button>
    </div>

    <div class="sidebar-sep"></div>

    <section id="pinnedSection" class="section hidden">
      <p class="section-label">PINNED</p>
      <div id="pinnedBar" class="pinned-bar"></div>
    </section>

    <section id="groupsSection" class="section">
      <div id="groupsContainer"></div>
    </section>

    <div id="footer" class="footer">
      <small>Sidebar — Tab Groups Manager</small>
    </div>
  </div>

  <script src="permissions.js"></script>
  <script src="storage.js"></script>
  <script src="workspace.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
