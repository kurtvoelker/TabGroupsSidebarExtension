<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tab Groups Sidebar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="root">
    <div class="topbar">
      <input id="search" placeholder="Search tabs..." />
      <div class="toolbar-buttons">
        <button id="sortBtn" title="Toggle sort">
          <span class="btn-icon">⇅</span>
          <span class="btn-label">Default</span>
        </button>
        <button id="openCloseBtn" title="Expand all accordions">
          <span class="btn-icon">📂</span>
          <span class="btn-label">Expand</span>
        </button>
        <button id="refreshBtn" title="Refresh">
          <span class="btn-icon">↻</span>
          <span class="btn-label">Refresh</span>
        </button>
      </div>
    </div>

    <div id="workspaceBar"></div>

    <section id="pinnedSection" class="section">
      <div id="pinnedBar" class="pinned-bar"></div>
    </section>

    <section id="groupsSection" class="section">
      <div id="groupsContainer"></div>
    </section>

    <div id="footer" class="footer">
      <small>Sidebar — Tab Groups Manager</small>
    </div>
  </div>

  <script src="permissions.js"></script>
  <script src="storage.js"></script>
  <script src="workspace.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
