<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tab Groups Sidebar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="root">
    <div class="topbar">
      <input id="search" placeholder="Search tabs by title or URL..." />
      <button id="sortBtn" title="Toggle sort">Sort: Default</button>
      <button id="openCloseBtn" title="Open all accordions">📂 Open all</button>
      <button id="refreshBtn" title="Refresh">⟳</button>
    </div>

    <section id="pinnedSection" class="section">
      <div id="pinnedBar" class="pinned-bar"></div>
    </section>

    <section id="groupsSection" class="section">
      <div id="groupsContainer"></div>
    </section>

    <div id="footer" class="footer">
      <small>Sidebar — Tab Groups Manager</small>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
