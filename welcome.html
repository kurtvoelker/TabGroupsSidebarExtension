<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Welcome — Tab Group Workspaces</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f3f4;
      color: #111;
    }

    .layout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 80px 10%;
      gap: 48px;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      flex: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
      color: #111;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #openBtn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 18px 28px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      line-height: 1.4;
      text-align: left;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 12px rgba(26,115,232,0.3);
    }

    #openBtn:hover { background: #1558b0; transform: translateY(-1px); }
    #openBtn:active { background: #0f47a1; transform: translateY(0); }

    #openBtn img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    #openBtn span {
      display: block;
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      color: #5f6368;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left">
      <img class="logo" src="icons/icon128.png" alt="Tab Group Workspaces" />
      <h1>Welcome to<br>Tab Group Workspaces!</h1>
    </div>
    <div class="right">
      <div>
        <button id="openBtn">
          <img src="icons/icon48.png" alt="" />
          <span>Open the Workspaces Sidebar<br>to get started</span>
        </button>
        <p id="status"></p>
      </div>
    </div>
  </div>

  <script src="welcome.js"></script>
</body>
</html>
