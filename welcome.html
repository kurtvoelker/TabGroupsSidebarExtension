<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Welcome — Tab Group Workspaces</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f3f4;
      color: #111;
    }

    .layout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 80px 10%;
      gap: 48px;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      flex: 1;
    }

    .headline {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 20px;
    }

    .logo {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      /* Nudge down slightly so the icon's visual top aligns with the cap-height of the text */
      margin-top: 4px;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
      color: #111;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #openBtn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 28px 36px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 16px rgba(26,115,232,0.35);
      min-width: 220px;
    }

    #openBtn:hover { background: #1558b0; transform: translateY(-1px); }
    #openBtn:active { background: #0f47a1; transform: translateY(0); }

    .btn-icon {
      width: 40px;
      height: 40px;
      stroke: #fff;
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      color: #5f6368;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left">
      <div class="headline">
        <img class="logo" src="icons/icon128.png" alt="Tab Group Workspaces" />
        <h1>Welcome to<br>Tab Group Workspaces!</h1>
      </div>
    </div>
    <div class="right">
      <div>
        <button id="openBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="18" rx="2"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
            <polyline points="10 8 7 12 10 16"/>
          </svg>
          Open the Workspaces Sidebar
        </button>
        <p id="status"></p>
      </div>
    </div>
  </div>

  <script src="welcome.js"></script>
</body>
</html>
